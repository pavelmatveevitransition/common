name: Update Parent Repositories

on:
  push:
    branches:
      - main

jobs:
  update-parent-repos:
    runs-on: ubuntu-latest
    strategy:
      # if one parent repo fails the workflow continues to update the rest.
      fail-fast: false
      matrix:
        parent_repo:
          - "pavelmatveevitransition/application"
          - "pavelmatveevitransition/application2"

    steps:
      - name: Determine Target Branch
        id: branch_info
        run: |
          echo "target_branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Configure Git for Private Repos
        run: |
          git config --global url."https://${{ secrets.ORG_ADMIN_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.ORG_ADMIN_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Checkout Parent Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.parent_repo }}
          ref: ${{ steps.branch_info.outputs.target_branch }}
          token: ${{ secrets.ORG_ADMIN_TOKEN }}
          fetch-depth: 0

      - name: Update Submodule on Specific Branch
        run: |
          TARGET_BRANCH="${{ steps.branch_info.outputs.target_branch }}"
          echo "Updating submodule for branch: $TARGET_BRANCH"
          
          # 1. Initialize submodules
          git submodule update --init

          # 2. Find the path of 'common' in .gitmodules
          SUB_PATH=$(grep "path = " .gitmodules | grep -i "common" | awk '{print $3}')
          
          if [ -z "$SUB_PATH" ]; then
            echo "Error: Could not find common in .gitmodules"
            exit 1
          fi
          
          echo "Found submodule at path: $SUB_PATH"
          
          # 3. Save SUB_PATH to environment
          echo "SUB_PATH=$SUB_PATH" >> $GITHUB_ENV

          # 4. Update the specific submodule
          # This configures the update command to track the specific branch temporarily,
          # without writing to .gitmodules.
          git config submodule.$SUB_PATH.branch $TARGET_BRANCH
          # Run update. It reads the branch from the local config.
          git submodule update --remote --merge $SUB_PATH

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain $SUB_PATH)" ]; then
            echo "Changes detected in $SUB_PATH, pushing to ${{ steps.branch_info.outputs.target_branch }}..."
            git add "$SUB_PATH"
            git commit -m "Automated update $SUB_PATH on ${{ steps.branch_info.outputs.target_branch }}"
            git push origin ${{ steps.branch_info.outputs.target_branch }}
          else
            echo "No changes needed for ${{ matrix.parent_repo }} on this branch."
          fi
